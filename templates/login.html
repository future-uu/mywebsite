<!DOCTYPE html>
<html>
<head>
    <title>로그인</title>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 60px;
            border-radius: 16px;
            box-shadow: 0 2px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 540px;
            text-align: center;
        }

        .site-name {
            font-size: 22px;
            font-weight: 700;
            color: #4f8ef7;
            letter-spacing: -0.5px;
            margin-bottom: 28px;
        }

        h1 {
            font-size: 30px;
            margin-bottom: 32px;
            color: #1a1a1a;
        }

        input {
            width: 100%;
            padding: 16px 18px;
            margin-bottom: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus { border-color: #4f8ef7; }

        button {
            width: 100%;
            padding: 16px;
            background: #4f8ef7;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 6px;
            transition: background 0.2s;
        }

        button:hover { background: #3a7de0; }

        .error {
            color: #e53e3e;
            font-size: 15px;
            margin-bottom: 14px;
        }

        .link {
            margin-top: 20px;
            font-size: 15px;
            color: #666;
        }

        .link a { color: #4f8ef7; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="site-name">sineweb-00-future</div>
        <h1>로그인</h1>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="아이디" required>
            <input type="password" name="password" placeholder="비밀번호" required>
            <button type="submit">로그인</button>
        </form>
        <p class="link">계정이 없으신가요? <a href="/register">회원가입</a></p>
    </div>
</body>
</html>
