<!DOCTYPE html>
<html>
<head>
    <title>프로필</title>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 60px;
            border-radius: 16px;
            box-shadow: 0 2px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 540px;
            text-align: center;
        }

        .site-name {
            font-size: 22px;
            font-weight: 700;
            color: #4f8ef7;
            letter-spacing: -0.5px;
            margin-bottom: 28px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: #4f8ef7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            color: white;
            margin: 0 auto 20px;
        }

        h1 {
            font-size: 26px;
            color: #1a1a1a;
            margin-bottom: 24px;
        }

        .info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 28px;
            text-align: left;
        }

        .info p {
            font-size: 16px;
            color: #444;
            padding: 10px 0;
        }

        .info p:not(:last-child) {
            border-bottom: 1px solid #eee;
        }

        .info strong { color: #1a1a1a; }

        a.logout {
            display: inline-block;
            padding: 13px 32px;
            background: #f0f2f5;
            color: #444;
            border-radius: 10px;
            text-decoration: none;
            font-size: 16px;
            transition: background 0.2s;
        }

        a.logout:hover { background: #e2e6ea; }
    </style>
</head>
<body>
    <div class="card">
        <div class="site-name">sineweb-00-future</div>
        <div class="avatar">{{ user.username[0].upper() }}</div>
        <h1>{{ user.username }}</h1>
        <div class="info">
            <p><strong>아이디</strong> &nbsp; {{ user.username }}</p>
            <p><strong>회원 번호</strong> &nbsp; {{ user.id }}</p>
            <p><strong>가입 날짜</strong> &nbsp; {{ user.created_at.strftime('%Y.%m.%d') if user.created_at else '-' }}</p>
        </div>
        <a href="/logout" class="logout">로그아웃</a>
    </div>
</body>
</html>
